<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Location Task Pro</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap');

body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
}

/* Glass Card */
.card {
    backdrop-filter: blur(15px);
    background: rgba(255,255,255,0.1);
    padding: 30px;
    border-radius: 20px;
    text-align: center;
    width: 90%;
    max-width: 350px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    animation: fadeIn 1s ease;
}

@keyframes fadeIn {
    from {opacity: 0; transform: translateY(20px);}
    to {opacity: 1; transform: translateY(0);}
}

h1 {
    margin-bottom: 10px;
}

p {
    font-size: 14px;
    opacity: 0.8;
}

/* Button */
.btn {
    margin-top: 20px;
    padding: 15px;
    width: 100%;
    border: none;
    border-radius: 30px;
    font-size: 16px;
    background: linear-gradient(45deg, #ff512f, #dd2476);
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

.btn:hover {
    transform: scale(1.08);
    box-shadow: 0 10px 20px rgba(0,0,0,0.4);
}

/* Status */
.status {
    margin-top: 15px;
    font-size: 14px;
}

/* Popup */
.popup {
    position: fixed;
    bottom: -100%;
    left: 50%;
    transform: translateX(-50%);
    background: white;
    color: black;
    padding: 20px;
    border-radius: 15px;
    width: 90%;
    max-width: 300px;
    text-align: center;
    transition: 0.4s;
}

.popup.show {
    bottom: 30px;
}

/* Loader */
.loader {
    border: 4px solid rgba(255,255,255,0.2);
    border-top: 4px solid white;
    border-radius: 50%;
    width: 25px;
    height: 25px;
    margin: 10px auto;
    animation: spin 1s linear infinite;
    display: none;
}

@keyframes spin {
    100% { transform: rotate(360deg); }
}
</style>
</head>

<body>

<div class="card">
    <h1>📍 Location Task</h1>
    <p>Reach the target location to complete your mission</p>

    <button class="btn" onclick="checkLocation()">Complete Task</button>

    <div class="loader" id="loader"></div>
    <div class="status" id="status"></div>
</div>

<div class="popup" id="popup">
    <h3 id="message"></h3>
</div>

<script>
const targetLat = 13.133837;
const targetLon = 80.208937;

function checkLocation() {
    document.getElementById("loader").style.display = "block";
    document.getElementById("status").innerText = "Checking location...";

    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(function(position) {

            const userLat = position.coords.latitude;
            const userLon = position.coords.longitude;

            const distance = getDistance(userLat, userLon, targetLat, targetLon);

            document.getElementById("loader").style.display = "none";

            if (distance <= 300) {
                showPopup("✅ Task Completed 🎉");
            } else {
                showPopup("❌ Move closer to location");
            }

            document.getElementById("status").innerText =
                "Distance: " + distance.toFixed(1) + " meters";

        }, function() {
            showPopup("⚠️ Location permission denied");
        });
    } else {
        showPopup("❌ Geolocation not supported");
    }
}

function getDistance(lat1, lon1, lat2, lon2) {
    const R = 6371000;
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLon = (lon2 - lon1) * Math.PI / 180;

    const a =
        Math.sin(dLat/2)*Math.sin(dLat/2) +
        Math.cos(lat1*Math.PI/180) *
        Math.cos(lat2*Math.PI/180) *
        Math.sin(dLon/2)*Math.sin(dLon/2);

    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));

    return R * c;
}

function showPopup(msg) {
    const popup = document.getElementById("popup");
    document.getElementById("message").innerText = msg;

    popup.classList.add("show");

    setTimeout(() => {
        popup.classList.remove("show");
    }, 2500);
}
</script>

</body>
</html>

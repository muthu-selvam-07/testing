<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Location Task</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            padding: 20px;
        }

        h1 {
            font-size: 28px;
            margin-bottom: 20px;
        }

        button {
            padding: 15px 30px;
            font-size: 18px;
            border: none;
            border-radius: 30px;
            background: #00c6ff;
            color: white;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        button:hover {
            background: #0072ff;
            transform: scale(1.1);
        }

        /* Popup */
        .popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            background: white;
            color: black;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            transition: 0.3s;
            z-index: 10;
        }

        .popup.active {
            transform: translate(-50%, -50%) scale(1);
        }

        .popup button {
            margin-top: 15px;
            background: #2a5298;
        }

        /* Overlay */
        .overlay {
            position: fixed;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            top: 0;
            left: 0;
            display: none;
        }

        .overlay.active {
            display: block;
        }

        /* Mobile */
        @media (max-width: 600px) {
            h1 {
                font-size: 22px;
            }

            button {
                width: 100%;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>📍 Location Task</h1>
        <button onclick="checkLocation()">Complete Task</button>
    </div>

    <div class="overlay" id="overlay"></div>

    <div class="popup" id="popup">
        <h2 id="message"></h2>
        <button onclick="closePopup()">OK</button>
    </div>

    <script>
        function checkLocation() {

            const targetLat = 13.133837;
            const targetLon = 80.208937;

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(function (position) {

                    const userLat = position.coords.latitude;
                    const userLon = position.coords.longitude;

                    const distance = getDistance(userLat, userLon, targetLat, targetLon);

                    if (distance <= 200) {
                        showPopup("✅ Task Completed!");
                    } else {
                        showPopup("❌ Go to the Location!");
                    }

                });
            } else {
                alert("Geolocation not supported");
            }
        }

        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371000;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;

            const a =
                Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                Math.cos(lat1 * Math.PI / 180) *
                Math.cos(lat2 * Math.PI / 180) *
                Math.sin(dLon / 2) * Math.sin(dLon / 2);

            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));

            return R * c;
        }

        function showPopup(msg) {
            document.getElementById("message").innerText = msg;
            document.getElementById("popup").classList.add("active");
            document.getElementById("overlay").classList.add("active");
        }

        function closePopup() {
            document.getElementById("popup").classList.remove("active");
            document.getElementById("overlay").classList.remove("active");
        }
    </script>

</body>

</html>
